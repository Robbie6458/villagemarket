services:
  # Coming soon landing page — live now
  - type: web
    name: village-market-landing
    runtime: static
    staticPublishPath: landing
    buildCommand: ""
    pullRequestPreviewsEnabled: false

  # Full Next.js app — deploy when ready
  - type: web
    name: village-market-app
    runtime: node
    rootDir: app
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_STRIPE_ONBOARDING_LINK
        sync: false
      - key: NEXT_PUBLIC_STRIPE_TIP_LINK
        sync: false
      - key: NEXT_PUBLIC_STRIPE_RECURRING_LINK
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: NEXT_PUBLIC_ML_APP_GROUP_ID
        sync: false
      - key: MAILERLITE_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        value: https://market.village-collective.com
